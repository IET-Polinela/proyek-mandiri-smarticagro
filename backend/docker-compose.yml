version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sensor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-sensor_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - sensor_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sensor_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ML FastAPI Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: sensor_ml_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - sensor_network
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sensor_mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - sensor_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sensor_backend
    restart: unless-stopped
    environment:
      # Server Config
      NODE_ENV: ${NODE_ENV:-production}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-5010}

      # Database Config
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-sensor_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

      # MQTT Config
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: ${MQTT_TOPIC:-sensor/final}

      # JWT Config
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}

      # Email Config
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}

      # ML Service Config
      ML_SERVICE_URL: http://ml-service:8000
    ports:
      - "${SERVER_PORT:-5010}:5010"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sensor_network
    volumes:
      # Optional: Mount logs directory
      - backend_logs:/app/logs
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5010/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  sensor_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_log:
    driver: local
